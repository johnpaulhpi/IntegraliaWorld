<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia - Repair Shop</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            color: #eee; 
            font-family: monospace; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #555;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            pointer-events: none;
            z-index: 10;
        }
        h2 { margin: 0 0 10px 0; color: #ffaa00; }
        
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
        }
        #instructions {
            text-align: center;
            font-size: 18px;
        }
        #instructions span {
            font-size: 24px;
            color: #ffaa00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <span>Click to Enter Shop</span><br><br>
            Mouse = Look Around<br>
            WASD = Move<br>
            E = Interact<br>
            Enter = Repair<br>
            ESC = Unlock Mouse
        </div>
    </div>

    <div id="ui-layer">
        <h2>Trash Goblin Workshop</h2>
        <p id="status-text">Status: Walk to the counter</p>
        <p id="prompt-text" style="color: #ffaa00; font-weight: bold;"></p>
    </div>
    <div id="crosshair">+</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505); 

        // LOWERED FOV to 60 to fix the edge-stretching and "snappy" turning
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.6, 5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING 
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
        scene.add(ambientLight);

        // Updated Torch Function (Now with 45-degree tilt and wall-facing rotation)
        function createTorch(x, y, z, rotationY) {
            const torchGroup = new THREE.Group();
            torchGroup.position.set(x, y, z);
            torchGroup.rotation.y = rotationY; // Face the correct direction

            // Sconce (Wall mount)
            const sconce = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.4, 0.1),
                new THREE.MeshLambertMaterial({ color: 0x222222 })
            );
            // Tilt forward by 45 degrees (Math.PI / 4)
            sconce.rotation.x = Math.PI / 4; 
            sconce.position.set(0, 0, -0.15); // Offset to touch the wall cleanly
            torchGroup.add(sconce);

            // Flame
            const flame = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.15, 0.1),
                new THREE.MeshBasicMaterial({ color: 0xffaa00 }) 
            );
            // Match the tilt geometry so the flame sits on the tip
            flame.position.set(0, 0.2, -0.35); 
            torchGroup.add(flame);

            // Light source
            const light = new THREE.PointLight(0xff8800, 1.2, 12);
            light.position.set(0, 0.3, -0.45);
            torchGroup.add(light);

            scene.add(torchGroup);
        }

        // Place Torches (passing in the required Y-rotation to face the room)
        createTorch(-6.8, 2.2, 2, -Math.PI / 2);   // Left wall, workshop
        createTorch(6.8, 2.2, 2, Math.PI / 2);     // Right wall, workshop
        createTorch(0, 2.5, 7.8, 0);               // Back wall, above workbench
        createTorch(-6.8, 2.2, -5, -Math.PI / 2);  // Left wall, customer area
        createTorch(6.8, 2.2, -5, Math.PI / 2);    // Right wall, customer area


        // 3. ROOM DIMENSIONS
        const roomWidth = 14;
        const roomHeight = 4;
        const shopDepth = 10; 
        const frontDepth = 6; 
        const totalDepth = shopDepth + frontDepth; 

        // 4. BUILD ENVIRONMENT (Floors & Walls)
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x2d302f }); 

        const shopFloorMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
        const shopFloor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, shopDepth), shopFloorMat);
        shopFloor.rotation.x = -Math.PI / 2;
        shopFloor.position.set(0, 0, 3); 
        scene.add(shopFloor);

        const frontFloorMat = new THREE.MeshLambertMaterial({ color: 0x2d251d });
        const frontFloor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, frontDepth), frontFloorMat);
        frontFloor.rotation.x = -Math.PI / 2;
        frontFloor.position.set(0, 0, -5); 
        scene.add(frontFloor);

        const ceilingMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, totalDepth), ceilingMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(0, roomHeight, -0);
        scene.add(ceiling);

        // Walls
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, roomHeight, 0.5), wallMat);
        backWall.position.set(0, roomHeight/2, 8);
        scene.add(backWall);

        const frontWall = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, roomHeight, 0.5), wallMat);
        frontWall.position.set(0, roomHeight/2, -8);
        scene.add(frontWall);

        const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, roomHeight, totalDepth), wallMat);
        leftWall.position.set(-7, roomHeight/2, 0);
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, roomHeight, totalDepth), wallMat);
        rightWall.position.set(7, roomHeight/2, 0);
        scene.add(rightWall);

        // 5. COUNTER & WORKBENCH
        const counterGeo = new THREE.BoxGeometry(10, 1.2, 1.5);
        const counterMat = new THREE.MeshLambertMaterial({ color: 0x4a3219 });
        const counter = new THREE.Mesh(counterGeo, counterMat);
        counter.position.set(-2, 0.6, -2);
        scene.add(counter);

        const benchGeo = new THREE.BoxGeometry(5, 1, 2.5);
        const benchMat = new THREE.MeshLambertMaterial({ color: 0x2a1e12 });
        const bench = new THREE.Mesh(benchGeo, benchMat);
        bench.position.set(0, 0.5, 5);
        scene.add(bench);

        // 6. THE BROKEN STAFF
        const staffGeo = new THREE.CylinderGeometry(0.06, 0.04, 1.8, 8);
        const staffMat = new THREE.MeshLambertMaterial({ color: 0x8b0000 }); 
        const staff = new THREE.Mesh(staffGeo, staffMat);
        staff.rotation.z = Math.PI / 2;
        staff.position.set(-2, 1.25, -2); 
        scene.add(staff);

        // 7. CONTROLS & LOGIC
        const controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');
        scene.add(controls.getObject());

        let staffState = "on_counter"; 
        const statusEl = document.getElementById('status-text');
        const promptEl = document.getElementById('prompt-text');
        const keys = { w: false, a: false, s: false, d: false };
        
        window.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true; 
            if(key === 'e') handleE();
            if(e.key === 'Enter') handleEnter();
        });
        
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false; 
        });

        function handleE() {
            if (!controls.isLocked) return;
            const distToCounter = camera.position.distanceTo(counter.position);
            const distToBench = camera.position.distanceTo(bench.position);

            if (staffState === "on_counter" && distToCounter < 3.5) {
                staffState = "held";
                camera.add(staff); 
                staff.position.set(0.6, -0.5, -1.2); 
                staff.rotation.set(Math.PI/3, 0, -Math.PI/6);
                statusEl.innerText = "Status: Staff acquired. Take it to the workbench.";
            } 
            else if (staffState === "held" && distToBench < 3.5) {
                staffState = "on_bench";
                scene.add(staff); 
                staff.position.set(0, 1.05, 5);
                staff.rotation.set(Math.PI/2, 0, Math.PI/2);
                statusEl.innerText = "Status: Ready for repair.";
            }
        }

        function handleEnter() {
            if (!controls.isLocked) return;
            const distToBench = camera.position.distanceTo(bench.position);
            if (staffState === "on_bench" && distToBench < 3.5) {
                staffState = "fixed";
                staff.material.color.setHex(0x00ffaa); 
                staff.material.emissive.setHex(0x00aa55);
                statusEl.innerText = "Status: Repair successful! (Queue math transition)";
                promptEl.innerText = "";
            }
        }

        // 8. MOVEMENT & COLLISION LOOP
        const speed = 0.08;

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                if (keys.w) controls.moveForward(speed);
                if (keys.s) controls.moveForward(-speed);
                if (keys.a) controls.moveRight(-speed);
                if (keys.d) controls.moveRight(speed);

                camera.position.y = 1.6; 

                // Simple Wall Collision
                const padding = 0.5; 
                if (camera.position.x < -7 + padding) camera.position.x = -7 + padding;
                if (camera.position.x > 7 - padding) camera.position.x = 7 - padding;
                if (camera.position.z < -8 + padding) camera.position.z = -8 + padding;
                if (camera.position.z > 8 - padding) camera.position.z = 8 - padding;

                // Update UI Prompts
                const distToCounter = camera.position.distanceTo(counter.position);
                const distToBench = camera.position.distanceTo(bench.position);
                promptEl.innerText = "";

                if (staffState === "on_counter" && distToCounter < 3.5) {
                    promptEl.innerText = "[E] Pick Up Staff";
                } else if (staffState === "held" && distToBench < 3.5) {
                    promptEl.innerText = "[E] Place on Workbench";
                } else if (staffState === "on_bench" && distToBench < 3.5) {
                    promptEl.innerText = "[ENTER] Begin Repair";
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
