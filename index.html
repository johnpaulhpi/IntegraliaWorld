<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia - Repair Shop Prototype</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            color: #eee; 
            font-family: monospace; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #444;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            pointer-events: none;
        }
        h2 { margin: 0 0 10px 0; color: #a8ff5c; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>Trash Goblin Workshop</h2>
        <p><b>WASD</b>: Move | <b>Arrows</b>: Look Left/Right</p>
        <p id="status-text">Status: Walk to the counter</p>
        <p id="prompt-text" style="color: #ffaa00; font-weight: bold;"></p>
    </div>
    <div id="crosshair">+</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5); // 1.6m is roughly eye-level

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffdf80, 0.8);
        pointLight.position.set(0, 4, 0);
        scene.add(pointLight);

        // 2. BUILD THE ENVIRONMENT (Floor, Counter, Workbench)
        
        // Floor
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Customer Counter (Front)
        const counterGeo = new THREE.BoxGeometry(6, 1, 1);
        const counterMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const counter = new THREE.Mesh(counterGeo, counterMat);
        counter.position.set(0, 0.5, -2);
        scene.add(counter);

        // Workbench (Back)
        const benchGeo = new THREE.BoxGeometry(4, 1, 2);
        const benchMat = new THREE.MeshLambertMaterial({ color: 0x3a2818 });
        const bench = new THREE.Mesh(benchGeo, benchMat);
        bench.position.set(0, 0.5, 3);
        scene.add(bench);

        // 3. THE STAFF
        const staffGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
        const staffMat = new THREE.MeshLambertMaterial({ color: 0x8b0000 }); // Broken (Red)
        const staff = new THREE.Mesh(staffGeo, staffMat);
        staff.rotation.z = Math.PI / 2;
        
        // Set initial staff position on the counter
        staff.position.set(0, 1.1, -2);
        scene.add(staff);

        // 4. GAME STATE & LOGIC
        let staffState = "on_counter"; // on_counter, held, on_bench, fixed
        const statusEl = document.getElementById('status-text');
        const promptEl = document.getElementById('prompt-text');

        // 5. MOVEMENT & CONTROLS (First Person)
        const keys = { w: false, a: false, s: false, d: false, ArrowLeft: false, ArrowRight: false };
        
        window.addEventListener('keydown', (e) => { 
            if(keys.hasOwnProperty(e.key)) keys[e.key] = true; 
            
            // Interaction Logic
            if(e.key.toLowerCase() === 'e') handleE();
            if(e.key === 'Enter') handleEnter();
        });
        window.addEventListener('keyup', (e) => { 
            if(keys.hasOwnProperty(e.key)) keys[e.key] = false; 
        });

        function handleE() {
            const distToCounter = camera.position.distanceTo(counter.position);
            const distToBench = camera.position.distanceTo(bench.position);

            if (staffState === "on_counter" && distToCounter < 3) {
                // Pick up staff
                staffState = "held";
                camera.add(staff); // Attach to camera (player)
                staff.position.set(0.5, -0.5, -1); // Position relative to eyes/hands
                staff.rotation.set(Math.PI/4, 0, 0);
                statusEl.innerText = "Status: Staff acquired. Take it to the workbench.";
            } 
            else if (staffState === "held" && distToBench < 3) {
                // Place staff on bench
                staffState = "on_bench";
                scene.add(staff); // Detach from camera, back to scene
                staff.position.set(0, 1.1, 3);
                staff.rotation.set(Math.PI/2, 0, Math.PI/2);
                statusEl.innerText = "Status: Ready for repair.";
            }
        }

        function handleEnter() {
            const distToBench = camera.position.distanceTo(bench.position);
            if (staffState === "on_bench" && distToBench < 3) {
                // Fix staff
                staffState = "fixed";
                staff.material.color.setHex(0x00ffaa); // Turns glowing green
                staff.material.emissive.setHex(0x005522);
                statusEl.innerText = "Status: Repair successful! (Queue math transition)";
                promptEl.innerText = "";
            }
        }

        // 6. MAIN LOOP
        const speed = 0.05;
        const turnSpeed = 0.03;

        function animate() {
            requestAnimationFrame(animate);

            // Movement Logic
            if (keys.w) camera.translateZ(-speed);
            if (keys.s) camera.translateZ(speed);
            if (keys.a) camera.translateX(-speed);
            if (keys.d) camera.translateX(speed);
            
            // Rotation Logic
            if (keys.ArrowLeft) camera.rotation.y += turnSpeed;
            if (keys.ArrowRight) camera.rotation.y -= turnSpeed;

            // Keep player at eye level
            camera.position.y = 1.6;

            // Update Prompts based on distance
            const distToCounter = camera.position.distanceTo(counter.position);
            const distToBench = camera.position.distanceTo(bench.position);
            promptEl.innerText = "";

            if (staffState === "on_counter" && distToCounter < 3) {
                promptEl.innerText = "[E] Pick Up Staff";
            } else if (staffState === "held" && distToBench < 3) {
                promptEl.innerText = "[E] Place on Workbench";
            } else if (staffState === "on_bench" && distToBench < 3) {
                promptEl.innerText = "[ENTER] Begin Repair";
            }

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
