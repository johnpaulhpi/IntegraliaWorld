<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia - Repair Shop Prototype (Mouselook)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            color: #eee; 
            font-family: monospace; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #444;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            pointer-events: none;
            z-index: 10;
        }
        h2 { margin: 0 0 10px 0; color: #a8ff5c; }
        
        /* New overlay for Pointer Lock requirement */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
        }
        #instructions {
            text-align: center;
            font-size: 18px;
        }
        #instructions span {
            font-size: 24px;
            color: #a8ff5c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <span>Click to Enter Shop</span><br><br>
            Mouse = Look Around<br>
            WASD = Move<br>
            E = Interact<br>
            Enter = Repair<br>
            ESC = Unlock Mouse
        </div>
    </div>

    <div id="ui-layer">
        <h2>Trash Goblin Workshop</h2>
        <p id="status-text">Status: Walk to the counter</p>
        <p id="prompt-text" style="color: #ffaa00; font-weight: bold;"></p>
    </div>
    <div id="crosshair">+</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5); // 1.6m is roughly eye-level

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffdf80, 0.8);
        pointLight.position.set(0, 4, 0);
        scene.add(pointLight);

        // 2. BUILD THE ENVIRONMENT (Floor, Counter, Workbench)
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const counterGeo = new THREE.BoxGeometry(6, 1, 1);
        const counterMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const counter = new THREE.Mesh(counterGeo, counterMat);
        counter.position.set(0, 0.5, -2);
        scene.add(counter);

        const benchGeo = new THREE.BoxGeometry(4, 1, 2);
        const benchMat = new THREE.MeshLambertMaterial({ color: 0x3a2818 });
        const bench = new THREE.Mesh(benchGeo, benchMat);
        bench.position.set(0, 0.5, 3);
        scene.add(bench);

        // 3. THE STAFF
        const staffGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
        const staffMat = new THREE.MeshLambertMaterial({ color: 0x8b0000 }); 
        const staff = new THREE.Mesh(staffGeo, staffMat);
        staff.rotation.z = Math.PI / 2;
        staff.position.set(0, 1.1, -2);
        scene.add(staff);

        // 4. POINTER LOCK CONTROLS (Mouselook)
        const controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', function () {
            controls.lock();
        });

        controls.addEventListener('lock', function () {
            blocker.style.display = 'none';
        });

        controls.addEventListener('unlock', function () {
            blocker.style.display = 'flex';
        });

        scene.add(controls.getObject());

        // 5. GAME STATE & LOGIC
        let staffState = "on_counter"; 
        const statusEl = document.getElementById('status-text');
        const promptEl = document.getElementById('prompt-text');

        // Movement & Interaction Inputs
        const keys = { w: false, a: false, s: false, d: false };
        
        window.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true; 
            
            if(key === 'e') handleE();
            if(e.key === 'Enter') handleEnter();
        });
        
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false; 
        });

        function handleE() {
            if (!controls.isLocked) return;

            const distToCounter = camera.position.distanceTo(counter.position);
            const distToBench = camera.position.distanceTo(bench.position);

            if (staffState === "on_counter" && distToCounter < 3) {
                staffState = "held";
                camera.add(staff); 
                staff.position.set(0.5, -0.5, -1); 
                staff.rotation.set(Math.PI/4, 0, 0);
                statusEl.innerText = "Status: Staff acquired. Take it to the workbench.";
            } 
            else if (staffState === "held" && distToBench < 3) {
                staffState = "on_bench";
                scene.add(staff); 
                staff.position.set(0, 1.1, 3);
                staff.rotation.set(Math.PI/2, 0, Math.PI/2);
                statusEl.innerText = "Status: Ready for repair.";
            }
        }

        function handleEnter() {
            if (!controls.isLocked) return;

            const distToBench = camera.position.distanceTo(bench.position);
            if (staffState === "on_bench" && distToBench < 3) {
                staffState = "fixed";
                staff.material.color.setHex(0x00ffaa); 
                staff.material.emissive.setHex(0x005522);
                statusEl.innerText = "Status: Repair successful! (Queue math transition)";
                promptEl.innerText = "";
            }
        }

        // 6. MAIN LOOP
        const speed = 0.08; // Slightly faster for true WASD feel

        function animate() {
            requestAnimationFrame(animate);

            // Only allow movement if the mouse is locked to the screen
            if (controls.isLocked === true) {
                // moveForward and moveRight calculate movement relative to where you are looking!
                if (keys.w) controls.moveForward(speed);
                if (keys.s) controls.moveForward(-speed);
                if (keys.a) controls.moveRight(-speed);
                if (keys.d) controls.moveRight(speed);

                // Lock the player to eye level (prevents flying)
                camera.position.y = 1.6;

                // Update UI Prompts
                const distToCounter = camera.position.distanceTo(counter.position);
                const distToBench = camera.position.distanceTo(bench.position);
                promptEl.innerText = "";

                if (staffState === "on_counter" && distToCounter < 3) {
                    promptEl.innerText = "[E] Pick Up Staff";
                } else if (staffState === "held" && distToBench < 3) {
                    promptEl.innerText = "[E] Place on Workbench";
                } else if (staffState === "on_bench" && distToBench < 3) {
                    promptEl.innerText = "[ENTER] Begin Repair";
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
